<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Weather apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a1022 0%, #060a14 100%);
            min-height: 100vh;
            padding: 1.8rem;
            position: relative;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1320px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .weather-dashboard {
            background: rgba(8, 14, 26, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 35px 65px -25px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 0.85fr;
            gap: 1.8rem;
            padding: 2rem;
        }

        .weather-primary {
            background: rgba(5, 12, 24, 0.5);
            border-radius: 2rem;
            padding: 1.5rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .weather-details {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .detail-card {
            background: rgba(5, 12, 24, 0.5);
            border-radius: 1.6rem;
            padding: 1.3rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .detail-card:hover {
            border-color: rgba(100, 180, 255, 0.4);
            transform: translateY(-3px);
        }

        .search-bar {
            display: flex;
            gap: 0.8rem;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 80px;
            padding: 0.3rem;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .search-bar:focus-within {
            border-color: rgba(255, 200, 100, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 180, 60, 0.15);
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            color: white;
            font-weight: 500;
            outline: none;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-bar button {
            background: linear-gradient(135deg, #f5a623, #e07800);
            border: none;
            padding: 0 2rem;
            border-radius: 80px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-bar button:hover {
            background: linear-gradient(135deg, #ffb83b, #f08a00);
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(245, 166, 35, 0.4);
        }

        .animation-zone {
            position: relative;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 1.8rem;
            margin: 0.5rem 0 1rem;
            min-height: 320px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.2);
        }

        #weather-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.8rem;
            pointer-events: none;
            z-index: 1;
        }

        .current-weather {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 1.2rem 1rem;
            background: linear-gradient(135deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 100%);
            backdrop-filter: blur(12px);
            border-radius: 1.4rem;
            margin: 0.8rem;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .weather-icon-main {
            width: 85px;
            height: 85px;
            margin: 0 auto;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.3));
        }

        .temp-main {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: white;
            margin: 0.2rem 0;
            text-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }

        .temp-main span {
            font-size: 1.5rem;
            font-weight: 500;
            color: #ffdca8;
        }

        .city-name-main {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0.1rem 0;
            background: linear-gradient(135deg, #ffffff, #ffd48a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .condition-text {
            font-size: 0.85rem;
            color: #ffeca8;
            background: rgba(0,0,0,0.35);
            display: inline-block;
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            margin-top: 6px;
            backdrop-filter: blur(4px);
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.2rem;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .metric-chip {
            background: rgba(0,0,0,0.4);
            border-radius: 1.2rem;
            padding: 0.8rem 0.3rem;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .metric-chip .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffdca8;
        }

        .metric-chip .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.9rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffdba5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .sun-times {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .forecast-items {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .forecast-item {
            background: rgba(0,0,0,0.4);
            border-radius: 1.2rem;
            padding: 0.7rem 0.5rem;
            text-align: center;
            min-width: 70px;
            transition: all 0.2s;
        }

        .status-toast {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            padding-bottom: 1rem;
        }

        @media (max-width: 850px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1.2rem;
            }
            .temp-main { font-size: 3rem; }
            .animation-zone { min-height: 280px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="weather-dashboard">
        <div class="dashboard-grid">
            <div class="weather-primary">
                <div class="search-bar">
                    <input type="text" id="cityInput" placeholder="Search city... Indore , Bhopal , Dewas" spellcheck="false">
                    <button id="searchBtn">✨ Search</button>
                </div>
                
                <div class="animation-zone" id="animationZone">
                    <canvas id="weather-canvas"></canvas>
                    <div class="current-weather">
                        <img src="https://openweathermap.org/img/wn/04d@4x.png" alt="weather icon" class="weather-icon-main" id="mainIcon">
                        <div class="temp-main" id="mainTemp">--<span>°C</span></div>
                        <div class="city-name-main" id="mainCity">Solara</div>
                        <div class="condition-text" id="conditionDesc">Live atmosphere</div>
                    </div>
                </div>
                
                <div class="metrics-row">
                    <div class="metric-chip"><div class="label">HUMIDITY</div><div class="value" id="humidityVal">--%</div></div>
                    <div class="metric-chip"><div class="label">WIND</div><div class="value" id="windVal">-- km/h</div></div>
                    <div class="metric-chip"><div class="label">PRESSURE</div><div class="value" id="pressureVal">-- hPa</div></div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <div class="info-row"><span class="info-label">🌡️ FEELS LIKE</span><span class="info-value" id="feelsLike">--°C</span></div>
                    <div class="info-row"><span class="info-label">💧 DEW POINT</span><span class="info-value" id="dewPoint">--°C</span></div>
                    <div class="info-row"><span class="info-label">👁️ VISIBILITY</span><span class="info-value" id="visibility">-- km</span></div>
                    <div class="info-row"><span class="info-label">🌬️ WIND GUST</span><span class="info-value" id="windGust">-- km/h</span></div>
                </div>
                <div class="detail-card">
                    <div class="sun-times"><div><div class="info-label">🌅 SUNRISE</div><div class="info-value" id="sunriseTime">--:--</div></div>
                    <div><div class="info-label">🌇 SUNSET</div><div class="info-value" id="sunsetTime">--:--</div></div></div>
                    <div class="info-row"><span class="info-label">☁️ CLOUD COVER</span><span class="info-value" id="cloudCover">--%</span></div>
                    <div class="info-row"><span class="info-label">🌡️ UV INDEX</span><span class="info-value" id="uvIndex">--</span></div>
                </div>
                <div class="detail-card">
                    <div class="info-label" style="margin-bottom: 0.7rem;">📆 5-DAY FORECAST</div>
                    <div class="forecast-items" id="forecastList"><div class="forecast-item">✨ loading...</div></div>
                </div>
            </div>
        </div>
        <div class="status-toast" id="statusMsg"></div>
    </div>
</div>

<script src="weather-app.js"></script>
</body>
</html>
